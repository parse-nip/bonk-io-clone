name = "bonk"
main = "worker/index.ts"
compatibility_date = "2026-07-20"
compatibility_flags = ["nodejs_compat"]

workers_dev = true

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/ws"]

[[durable_objects.bindings]]
name = "ROOM"
class_name = "GameRoom"

[[durable_objects.bindings]]
name = "LOBBY"
class_name = "LobbyDirectory"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom", "LobbyDirectory"]

[observability]
enabled = true
