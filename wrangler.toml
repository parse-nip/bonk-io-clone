name = "bonk"
main = "worker/index.ts"
compatibility_date = "2026-07-20"
compatibility_flags = ["nodejs_compat"]

# Same CF account as popped.dev
account_id = "f176df02bc99b7cfffece89aa198d41e"

workers_dev = true

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/ws"]

[[durable_objects.bindings]]
name = "ROOM"
class_name = "GameRoom"

[[durable_objects.bindings]]
name = "LOBBY"
class_name = "LobbyDirectory"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom", "LobbyDirectory"]

[[routes]]
pattern = "bonk.popped.dev"
custom_domain = true

[observability]
enabled = true
